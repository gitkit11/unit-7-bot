name: UNIT-7 Bot

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC — Европа утро
    - cron: '0 12 * * *'  # 12:00 UTC — США восток утро (прайм)
    - cron: '0 18 * * *'  # 18:00 UTC — США день / Европа вечер (прайм)
    - cron: '0 22 * * *'  # 22:00 UTC — США вечер (прайм)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run bot
        env:
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot.py
